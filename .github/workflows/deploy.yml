name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/lior/fastapi-app
            sudo git pull origin main
            sudo venv/bin/pip install -r requirements.txt -q
            sudo systemctl restart fastapi
```

---

**ב-GitHub → הפרויקט שלך → Settings → Secrets and variables → Actions → New repository secret:**
```
SERVER_HOST    = ה-IP של השרת
SERVER_USER    = admin
SERVER_SSH_KEY = המפתח הפרטי SSH שלך
