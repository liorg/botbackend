name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check secrets
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          if [ -z "$SERVER_HOST" ]; then echo "SERVER_HOST empty"; exit 1; else echo "SERVER_HOST exists"; fi
          if [ -z "$SERVER_USER" ]; then echo "SERVER_USER empty"; exit 1; else echo "SERVER_USER exists"; fi
          if [ -z "$SERVER_SSH_KEY" ]; then echo "SERVER_SSH_KEY empty"; exit 1; else echo "SERVER_SSH_KEY exists"; fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          set -e

          echo "WHOAMI:"
          whoami

          echo "FIX PERMISSIONS:"
          sudo chown -R lior:lior /home/lior/fastapi-app
          sudo rm -f /home/lior/fastapi-app/.git/index.lock

          cd /home/lior/fastapi-app

          echo "CHECK:"
          ls -ld .
          ls -ld .git
          ls -l .git/index || true

          git reset --hard
          git pull origin main

          ./venv/bin/pip install -r requirements.txt -q
          sudo -n systemctl restart fastapi